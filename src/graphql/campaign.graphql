fragment Campaign on Campaign {
  id
  name
  state
  dailyCap
  priority
  passThroughRate
  pacingOverride
  pacingStrategy
  externalId
  currency
  budget
  spent
  createdAt
  startAt
  endAt
  source
  type
  format
  paymentType
  dayProportion
  stripePaymentId
  hasPaymentIntent
  dayPartings {
    dow
    startMinute
    endMinute
  }
  geoTargets {
    code
    name
  }
  adSets(limit: 100000, offset: 0) {
    ...AdSet
  }
  advertiser {
    id
  }
}

fragment CampaignSummary on Campaign {
  id
  name
  state
  dailyCap
  priority
  passThroughRate
  pacingOverride
  pacingStrategy
  externalId
  currency
  budget
  paymentType
  createdAt
  startAt
  endAt
  source
  type
  format
  dayProportion
  brandedKeywords
  adsManagerCurrentBalance
  hasInProcessOrCompleteTransfer
  advertiser {
    id
    name
  }
}

fragment CampaignAds on Campaign {
  id
  name
  state
  startAt
  endAt
  source
  currency
  format
  advertiser {
    id
  }
  adSets(limit: 100000, offset: 0) {
    ...AdSetWithDeletedAds
  }
}

query LoadCampaign($id: String!) {
  campaign(id: $id) {
    ...Campaign
  }
}

query LoadCampaignAds($id: String!) {
  campaign(id: $id) {
    ...CampaignAds
  }
}

mutation AdsManagerCreateCampaign($input: AdsManagerCreateCampaignInput!) {
  adsManagerCreateCampaign(input: $input) {
    id
    paymentType
  }
}

mutation UpdateCampaign($input: UpdateCampaignInput!) {
  updateCampaign(updateCampaignInput: $input) {
    id
    paymentType
    stripePaymentId
  }
}
