fragment AdSet on AdSet {
  id
  price
  createdAt
  billingType
  name
  totalMax
  perDay
  state
  segments {
    code
    name
  }
  operatingSystems
  conversion {
    id
    urlPattern
    observationWindow
  }
  ads {
    ...Ad
  }
}

fragment Ad on Ad {
  id
  state
  creative {
    ...Creative
  }
}

fragment AdSetWithDeletedAds on AdSet {
  id
  createdAt
  name
  state
  billingType
  operatingSystems
  segments {
    code
    name
  }
  conversion {
    id
  }
  ads(includeDeleted: true) {
    ...Ad
  }
}
